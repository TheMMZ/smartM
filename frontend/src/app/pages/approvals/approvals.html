<div style="padding: 32px; font-family: 'Inter', sans-serif;">
  <h1 style="font-size: 24px; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.15em; color: #F0F0F0; margin-bottom: 32px; border-bottom: 1px solid rgba(240,240,240,0.06); padding-bottom: 16px;">
    Pending Piece Requests
  </h1>

  <div style="background-color: #111114; border: 1px solid rgba(240,240,240,0.08); overflow-x: auto;">
    <table style="width: 100%; border-collapse: collapse; text-align: left;">
      <thead>
        <tr style="border-bottom: 1px solid rgba(240,240,240,0.06); background-color: rgba(240,240,240,0.02);">
          <th style="padding: 16px; font-size: 10px; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; color: #8A8A93;">Task</th>
          <th style="padding: 16px; font-size: 10px; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; color: #8A8A93;">Requested By</th>
          <th style="padding: 16px; font-size: 10px; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; color: #8A8A93;">Piece</th>
          <th style="padding: 16px; font-size: 10px; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; color: #8A8A93;">Quantity</th>
          <th style="padding: 16px; font-size: 10px; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; color: #8A8A93;">Date</th>
          <th style="padding: 16px; font-size: 10px; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; color: #8A8A93;">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let req of pendingRequests" style="border-bottom: 1px solid rgba(240,240,240,0.04); transition: background-color 0.2s ease;">
          <td style="padding: 16px; font-size: 13px; color: #F0F0F0; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ req.tache?.description || 'N/A' }}</td>
          <td style="padding: 16px; font-size: 13px; color: #8A8A93;">{{ req.requestedBy }}</td>
          <td style="padding: 16px; font-size: 13px; color: #F0F0F0; font-family: 'Space Grotesk', sans-serif;">{{ req.piece?.nom }} <span style="color:#8A8A93; font-size: 11px;">({{ req.piece?.reference }})</span></td>
          <td style="padding: 16px; font-size: 14px; font-family: 'Space Grotesk', sans-serif; font-weight: 600; color: #00A8E8;">{{ req.quantite }}</td>
          <td style="padding: 16px; font-size: 12px; color: #8A8A93;">{{ req.createdAt | date:'short' }}</td>
          <td style="padding: 16px; display: flex; gap: 8px;">
            <button (click)="approveRequest(req.id)" style="background-color: transparent; color: #00A8E8; border: 1px solid #00A8E8; padding: 6px 12px; font-size: 10px; text-transform: uppercase; cursor: pointer; font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.05em; font-weight: 700;">Approve</button>
            <button (click)="rejectRequest(req.id)" style="background-color: transparent; color: #ff6b6b; border: 1px solid #ff6b6b; padding: 6px 12px; font-size: 10px; text-transform: uppercase; cursor: pointer; font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.05em; font-weight: 700;">Reject</button>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="pendingRequests.length === 0" style="padding: 32px; text-align: center; font-size: 12px; color: #8A8A93; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.1em;">
      No pending requests found.
    </div>
  </div>
</div>
